Manage Passkeys
<h2>Passkeys for {{userName}}</h2>

@if (credentials.length === 0) {
    <p>No passkeys registered.</p>
}

@if (credentials.length > 0) {
    <table mat-table [dataSource]="credentialsDataSource" class="mat-elevation-z4">
        <ng-container matColumnDef="createdDt">
            <th mat-header-cell *matHeaderCellDef>Registered</th>
            <td mat-cell *matCellDef="let cred">{{cred.createdDt | date:'medium':'EST'}}</td>
        </ng-container>

        <ng-container matColumnDef="origin">
            <th mat-header-cell *matHeaderCellDef>Origin</th>
            <td mat-cell *matCellDef="let cred">{{cred.origin || '—'}}</td>
        </ng-container>

        <ng-container matColumnDef="userAgent">
            <th mat-header-cell *matHeaderCellDef>Browser / Device</th>
            <td mat-cell *matCellDef="let cred">{{cred.userAgent || '—'}}</td>
        </ng-container>

        <ng-container matColumnDef="delete">
            <th mat-header-cell *matHeaderCellDef>Delete</th>
            <td mat-cell *matCellDef="let cred">
                <button (click)="deleteCredential(cred)">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
}

<br/>
<button mat-button (click)="goBack()">Back</button>
