<mat-card>
    <mat-card-title>Edit User</mat-card-title>
    <mat-card-content>
        <form [formGroup]="editUserForm">
            <mat-form-field>
                <mat-label>User Name</mat-label>
                <input matInput formControlName="userNameControl" autocomplete="off">
                @if (editUserForm.get('userNameControl').invalid && editUserForm.get('userNameControl').touched) {
                    <mat-error>User name is required</mat-error>
                }
            </mat-form-field>

            <br>

            <mat-form-field>
                <mat-label>New Password</mat-label>
                <input matInput type="password" formControlName="passwordControl" autocomplete="new-password">
                <mat-hint>Leave blank to keep existing password</mat-hint>
            </mat-form-field>

            <br>

            <mat-form-field>
                <mat-label>Confirm Password</mat-label>
                <input matInput type="password" formControlName="confirmPasswordControl" autocomplete="new-password">
                @if (editUserForm.hasError('passwordsMismatch')) {
                    <mat-error>Passwords do not match</mat-error>
                }
            </mat-form-field>
        </form>
    </mat-card-content>
    <mat-card-actions>
        <button mat-raised-button color="primary" [disabled]="editUserForm.invalid || saved" (click)="onSave()">Save</button>
        <button mat-button [routerLink]="['/manageUsers']">Cancel</button>
    </mat-card-actions>
</mat-card>
