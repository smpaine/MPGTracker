<div class="login jumbotron center-block">
  <h1>Login</h1>
  <form role="form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" formControlName="userName" class="form-control" placeholder="Username">
      @if (submitted && f.userName.errors) {
        <div class="invalid-feedback">
          @if (f.userName.errors.required) {
            <div>Username is required</div>
          }
        </div>
      }
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" formControlName="password" class="form-control" placeholder="Password">
      @if (submitted && f.password.errors) {
        <div class="invalid-feedback">
          @if (f.password.errors.required) {
            <div>Password is required</div>
          }
        </div>
      }
    </div>
    <div class="form-group">
      <button [disabled]="loading" class="btn btn-primary">Login</button>
      @if (passkeySupported) {
        <button type="button" [disabled]="loading" class="btn btn-secondary ml-2" (click)="loginWithPasskey()">Sign in with Passkey</button>
      }
      @if (loading) {
